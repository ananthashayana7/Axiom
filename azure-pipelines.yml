trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NodeVersion: "20.x"
  # Set these in the Azure DevOps pipeline UI (or variable group) — not here.
  # dockerRegistryServiceConnection: '<service-connection-name>'
  # containerRegistry: '<your-acr>.azurecr.io'
  # imageRepository: 'axiom'

stages:
  # ── Stage 1: Validate ──────────────────────────────────────────────
  - stage: Validate
    displayName: Lint & Test
    jobs:
      - job: LintAndTest
        displayName: Lint, Unit Tests, Build
        steps:
          - task: NodeTool@0
            displayName: Use Node.js $(NodeVersion)
            inputs:
              versionSpec: $(NodeVersion)

          - script: npm ci --legacy-peer-deps
            displayName: Install dependencies

          - script: npm run lint
            displayName: Lint

          - script: npm run test:unit
            displayName: Run unit tests

          - script: npm run build
            displayName: Build Next.js app

  # ── Stage 2: Docker Build & Push (main only) ───────────────────────
  - stage: DockerBuildPush
    displayName: Build & Push Docker Image
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        displayName: Docker Build & Push to ACR
        steps:
          - task: Docker@2
            displayName: Build and push image
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              command: buildAndPush
              Dockerfile: $(Build.SourcesDirectory)/Dockerfile
              buildContext: $(Build.SourcesDirectory)
              tags: |
                $(Build.BuildId)
                latest
